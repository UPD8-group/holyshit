
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>HolyShit.app — Relief Radar</title>
  <meta name="description" content="Find public toilets and drinking water near you or along your route.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="shortcut icon" href="favicon.png">
  <meta name="theme-color" content="#faf8f3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HolyShit">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Palette */
      --cream:       #faf8f3;
      --card:        #eeecea;
      --card-hi:     #e5e2da;
      --border:      #dbd8d0;
      --border-hi:   #c8c4bc;
      --orange:      #e8601a;
      --orange-lt:   rgba(232,96,26,0.10);
      --orange-glow: rgba(232,96,26,0.25);
      --orange-dk:   #c44e10;
      --water:       #1a8fd9;
      --water-lt:    rgba(26,143,217,0.10);
      --text:        #1a1008;
      --text-mid:    #6b6258;
      --text-dim:    #a89e94;
      
      /* Specs */
      --radius:      14px;
      --radius-sm:   10px;
      --shadow:      0 4px 20px rgba(100,80,60,0.15);
      --shadow-sm:   0 2px 10px rgba(100,80,60,0.10);
      --font-d:      'Anton', sans-serif;
      --font-b:      'DM Sans', sans-serif;

      /* Header Specs */
      --notch-h:      env(safe-area-inset-top, 0px);
      --header-base:  60px;
      --header-total: calc(var(--header-base) + var(--notch-h));
      --route-bar-h:  40px; 
      --nav-h:        calc(64px + env(safe-area-inset-bottom, 0px));
    }

    html, body {
      height: 100%; width: 100%; overflow: hidden;
      background: var(--cream); color: var(--text);
      font-family: var(--font-b);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    #map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; background: #e5e2da; }
    
    /* Push Google Controls */
    .gm-bundled-control { bottom: 80px !important; }
    .gmnoprint.gm-bundled-control-on-bottom { bottom: 80px !important; }
    .gm-style-mtc-bbw, .gm-style .gm-style-mtc, div[style*="position: absolute"][style*="top"] .gmnoprint { top: calc(var(--header-total) + 12px) !important; }

    /* ── SOLID WHITE TOP BANNER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 120;
      height: var(--header-total); background: #FFFFFF;
      border-bottom: 1px solid var(--border); box-shadow: var(--shadow-sm);
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--notch-h) 16px 0; 
    }
    #mainLogo { height: 34px; width: auto; cursor: pointer; }

    header .mode-row { flex: none; width: 160px; display: flex; gap: 5px; }
    header .mode-pill {
      flex: 1; padding: 6px 8px; border-radius: 30px;
      border: 1.5px solid var(--border); background: var(--cream);
      color: var(--text-mid); font-family: var(--font-b); font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; text-align: center; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(100,80,60,0.12);
    }
    header .mode-pill.active {
      background: var(--orange); color: #fff; border-color: var(--orange);
      box-shadow: 0 2px 10px var(--orange-glow);
    }

    /* ── ROUTE STATS BAR ── */
    .route-bar {
      position: fixed; z-index: 115; /* Hides perfectly behind header */
      top: var(--header-total); left: 0; right: 0;
      height: var(--route-bar-h); background: var(--cream);
      border-bottom: 1.5px solid var(--border);
      padding: 0 16px; display: flex; align-items: center; gap: 12px;
      font-size: 11px; font-weight: 600; box-shadow: var(--shadow-sm);
      transform: translateY(-100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .route-bar.show { transform: translateY(0); }
    .rs-stat { color: var(--text-mid); }
    .rs-stat strong { color: var(--text); }
    .rs-div { flex: 1; }
    .rs-clear {
      background: none; border: 1px solid var(--border);
      color: var(--text-mid); font-size: 9px; padding: 2px 8px; border-radius: 20px;
      cursor: pointer; font-family: var(--font-b);
    }
    .rs-clear:hover { border-color: var(--orange); color: var(--orange); }

    /* ── FLOATING UI ELEMENTS (Search Bars) ── */
    .floating-ui {
      position: fixed; z-index: 110;
      top: calc(var(--header-total) + 12px); 
      left: 0; right: 0; padding: 0 12px; pointer-events: none;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .floating-ui > * { pointer-events: all; } 
    .floating-ui.shifted { transform: translateY(var(--route-bar-h)); }

    .search-card {
      background: var(--cream); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 9px; box-shadow: 0 4px 16px rgba(100,80,60,0.14);
    }
    .search-row { display: flex; align-items: center; gap: 8px; }
    .vline { width: 1px; height: 12px; background: var(--border); margin: 2px 0 2px 3px; flex-shrink: 0; }
    .rs { margin-top: 5px; } 

    .search-input {
      flex: 1; background: var(--card); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 8px 10px; color: var(--text);
      font-family: var(--font-b); font-size: 13px; outline: none;
      transition: border-color 0.18s; min-width: 0;
    }
    .search-input:focus { border-color: var(--orange); background: #fff; }
    .search-input::placeholder { color: var(--text-dim); }

    .find-btn {
      padding: 8px 14px; border-radius: 8px; border: none;
      background: var(--orange); color: #fff; font-family: var(--font-d);
      font-size: 14px; letter-spacing: 0.5px; cursor: pointer; white-space: nowrap;
    }

    .tm-row { display: flex; gap: 5px; margin-top: 8px; }
    .action-btn.secondary {
      background: var(--card); color: var(--text); border: 1.5px solid var(--border); 
      font-size: 12px; flex: 1; text-align: center; padding: 6px 0; 
      font-family: var(--font-b); font-weight: 600; cursor:pointer;
    }
    .action-btn.secondary.sel { background: var(--orange-lt); border-color: var(--orange); color: var(--orange); }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-o { background: var(--orange); box-shadow: 0 0 4px var(--orange-glow); }
    .dot-d { background: var(--text); }

    /* ── FILTER BOTTOM NAV ── */
    #bottom-nav { 
      position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); z-index: 2500; 
      background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
      border-top: 1px solid var(--border); display: flex; align-items: flex-start; 
      padding-top: 8px; padding-bottom: env(safe-area-inset-bottom, 0px); 
      box-shadow: 0 -4px 20px rgba(100,80,60,0.15); 
    }
    .nav-tab { 
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
      gap: 4px; cursor: pointer; padding: 6px 4px 0; border: none; background: transparent; 
      position: relative; -webkit-appearance: none; appearance: none; -webkit-tap-highlight-color: transparent; 
    }
    .nav-icon { 
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; 
      font-size: 1.3rem; border-radius: 8px; transition: background 0.15s, transform 0.15s; 
      opacity: 0.45; /* Greyed out when inactive */
    }
    .nav-label { 
      font-size: 0.6rem; font-weight: 600; letter-spacing: 0.3px; color: var(--text-dim); 
      transition: color 0.15s; white-space: nowrap; 
    }
    
    /* Toggle Active States */
    .filter-tab.on-t.active .nav-icon { background: var(--orange-lt); opacity: 1; color: var(--orange);}
    .filter-tab.on-t.active .nav-label { color: var(--orange); }
    
    .filter-tab.on-w.active .nav-icon { background: var(--water-lt); opacity: 1; color: var(--water);}
    .filter-tab.on-w.active .nav-label { color: var(--water); }
    
    .filter-tab.on-a.active .nav-icon { background: rgba(100,60,200,0.1); opacity: 1; color: #6044cc;}
    .filter-tab.on-a.active .nav-label { color: #6044cc; }

    /* Action Tab States */
    .action-tab .nav-icon { opacity: 1; color: var(--text-mid); } 
    .action-tab:active .nav-icon { transform: scale(0.9); }
    
    /* Run Tracker State */
    .nav-tab.running .nav-icon { background: rgba(34,197,94,0.15); animation: pulse-green 1.5s ease-in-out infinite; opacity: 1; color: #16A34A; }
    .nav-tab.running .nav-label { color: #16A34A; }
    @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 50% { box-shadow: 0 0 0 8px rgba(34,197,94,0); } }

    /* ── FAB ── */
    .fab-stack { position: fixed; bottom: 85px; right: 14px; z-index: 100; }
    .fab {
      width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      background: var(--orange); color: #fff; font-size: 18px;
      box-shadow: 0 4px 18px var(--orange-glow), var(--shadow); transition: all 0.18s;
    }
    .fab:hover  { background: var(--orange-dk); }
    .fab:active { transform: scale(0.92); }
    .fab.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── COUNT PILL ── */
    .count-pill {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      z-index: 100; background: var(--cream); border: 1.5px solid var(--border);
      border-radius: 30px; padding: 6px 16px; font-size: 12px; font-weight: 600;
      color: var(--text-mid); white-space: nowrap; box-shadow: var(--shadow);
      transition: opacity 0.3s; pointer-events: none; opacity: 0;
    }
    .count-pill.show { opacity: 1; }
    .count-pill .hi { color: var(--orange); font-weight: 700; }
    .count-pill .wi { color: var(--water);  font-weight: 700; }

    /* ── BOTTOM SHEET ── */
    .backdrop { position: fixed; inset: 0; background: rgba(26,16,8,0.40); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .backdrop.on { opacity: 1; pointer-events: all; }
    .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 201; background: var(--cream); border-top: 1.5px solid var(--border); border-radius: 20px 20px 0 0; box-shadow: 0 -6px 30px rgba(100,80,60,0.16); transform: translateY(100%); transition: transform 0.32s cubic-bezier(0.32,0.72,0,1); max-height: 82vh; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: max(28px, env(safe-area-inset-bottom)); }
    .sheet.on { transform: translateY(0); }
    .sheet-handle { width: 34px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
    .sheet-body { padding: 16px 20px 8px; }
    .type-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 20px; font-family: var(--font-b); font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 7px; }
    .type-badge.toilet { background: var(--orange-lt); color: var(--orange); border: 1px solid rgba(232,96,26,0.2); }
    .type-badge.water  { background: var(--water-lt);  color: var(--water);  border: 1px solid rgba(26,143,217,0.2); }
    .sheet-name { font-family: var(--font-d); font-size: 24px; line-height: 1.0; margin-bottom: 3px; }
    .sheet-meta { color: var(--text-mid); font-size: 12px; margin-bottom: 12px; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .chip { padding: 3px 9px; border-radius: 20px; font-family: var(--font-b); font-size: 11px; font-weight: 500; border: 1px solid var(--border); background: var(--card); color: var(--text-mid); }
    .chip.yes { border-color: var(--orange); color: var(--orange); background: var(--orange-lt); }
    .chip.water-yes { border-color: var(--water);  color: var(--water);  background: var(--water-lt); }
    .sheet-notes { color: var(--text-mid); font-size: 13px; line-height: 1.5; padding: 10px 12px; background: var(--card); border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 14px; }
    .dir-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--orange); color: #fff; font-family: var(--font-d); font-size: 15px; letter-spacing: 0.5px; text-align: center; cursor: pointer; display: block; }
    .dir-btn:hover { background: var(--orange-dk); }

    /* ── RUN HUD (Fixed Z-Index & Clean Theme) ── */
    #run-hud { 
      position: fixed; top: var(--header-total); left: 0; right: 0; z-index: 115; /* Safely behind header */
      display: flex; transform: translateY(-100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; 
    }
    #run-hud.active { transform: translateY(0); pointer-events: auto; }
    .hud-cell { flex: 1; background: var(--cream); border-bottom: 3px solid var(--orange); padding: calc(env(safe-area-inset-top, 0px) + 14px) 0 14px; text-align: center; }
    .hud-cell + .hud-cell { border-left: 1px solid var(--border); }
    .hud-value { font-family: 'Anton', sans-serif; font-weight: 400; font-size: 1.9rem; line-height: 1; color: var(--text); }
    .hud-value.hl { color: var(--orange); }
    .hud-label { font-size: 0.55rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-top: 4px; }

    /* ── TOAST ── */
    .toast { position: fixed; top: calc(var(--header-total) + 160px); left: 50%; transform: translateX(-50%) translateY(-8px); z-index: 500; background: var(--text); color: var(--cream); padding: 9px 18px; border-radius: 30px; font-size: 13px; font-weight: 500; pointer-events: none; opacity: 0; transition: all 0.25s; max-width: calc(100vw - 40px); text-align: center; box-shadow: var(--shadow); white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .pac-container { background:var(--cream)!important; border:1.5px solid var(--border)!important; border-radius:var(--radius-sm)!important; box-shadow:var(--shadow)!important; font-family:var(--font-b)!important; z-index:1000!important;}
    .pac-item { color:var(--text)!important; border-top-color:var(--border)!important; padding:9px 12px!important; font-size:13px!important; cursor:pointer; }
    .pac-item:hover { background:var(--card)!important; }
    .pac-item-query { color:var(--text)!important; }
    .pac-matched { color:var(--orange)!important; font-weight:700; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="map"></div>

<header id="mainHeader">
  <img src="https://holyshit.app/logo.png" id="mainLogo" alt="HolyShit" onclick="location.reload()">
  
  <div class="mode-row">
    <button class="mode-pill active" id="pillNearest" onclick="setMode('nearest')">&#128205; Nearest</button>
    <button class="mode-pill"        id="pillRoute"   onclick="setMode('route')">&#127939; Route</button>
  </div>
</header>

<div class="route-bar" id="routeBar">
  <span class="rs-stat">&#128205; <strong id="statDist">—</strong></span>
  <span class="rs-stat">&#9202;&#65039; <strong id="statTime">—</strong></span>
  <span class="rs-stat">&#128699; <strong id="statToilets">—</strong></span>
  <span class="rs-stat">&#128167; <strong id="statWater">—</strong></span>
  <div class="rs-div"></div>
  <button class="rs-clear" onclick="clearRoute()">&#10005; Clear</button>
</div>

<div id="floatingUi" class="floating-ui">
  <div class="search-card" id="cardNearest">
    <div class="search-row">
      <input type="text" id="inputNearest" class="search-input" placeholder="Search a suburb or landmark…" autocomplete="off">
      <button class="find-btn" onclick="searchNearest()">FIND</button>
    </div>
  </div>

  <div class="search-card hidden" id="cardRoute">
    <div class="search-row">
      <span class="dot dot-o"></span>
      <input type="text" id="inputOrigin" class="search-input" placeholder="Start — tap map or search…" autocomplete="off" onfocus="startPicking('start')">
    </div>
    <div class="vline"></div>
    <div class="search-row rs">
      <span class="dot dot-d"></span>
      <input type="text" id="inputDest" class="search-input" placeholder="Finish — tap map or search…" autocomplete="off" onfocus="startPicking('end')">
      <button class="find-btn" onclick="planRoute()">GO</button>
    </div>
    <div class="tm-row">
      <button class="action-btn secondary sel" id="tmWalk"  onclick="setTravelMode('WALKING')">&#128694; Walk</button>
      <button class="action-btn secondary"     id="tmBike"  onclick="setTravelMode('BICYCLING')">&#128692; Cycle</button>
      <button class="action-btn secondary"     id="tmDrive" onclick="setTravelMode('DRIVING')">&#128663; Drive</button>
    </div>
  </div>
</div>

<div class="count-pill" id="countPill">
  <span class="hi" id="countT">0</span> toilets &nbsp;&middot;&nbsp;
  <span class="wi" id="countW">0</span> water
</div>

<div class="fab-stack">
  <button class="fab" id="fabLocate" onclick="locateMe()" title="Find my location">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9" opacity=".4"/>
      <line x1="12" y1="2"  x2="12" y2="5"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="2"  y1="12" x2="5"  y2="12"/>
      <line x1="19" y1="12" x2="22" y2="12"/>
    </svg>
  </button>
</div>

<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<div id="run-hud">
    <div class="hud-cell"><div class="hud-value" id="hud-dist">0.00</div><div class="hud-label" id="hud-dist-lbl">KM</div></div>
    <div class="hud-cell"><div class="hud-value hl" id="hud-pace">--:--</div><div class="hud-label" id="hud-pace-lbl">MIN/KM</div></div>
    <div class="hud-cell"><div class="hud-value" id="hud-pits">0</div><div class="hud-label">PIT STOPS</div></div>
</div>

<div class="toast" id="toast"></div>

<nav id="bottom-nav">
  <button class="nav-tab filter-tab on-t active" id="navToilet" onclick="toggleLayer('toilet')">
      <div class="nav-icon">&#128699;</div>
      <div class="nav-label">Toilets</div>
  </button>
  <button class="nav-tab filter-tab on-w active" id="navWater" onclick="toggleLayer('water')">
      <div class="nav-icon">&#128167;</div>
      <div class="nav-label">Water</div>
  </button>
  <button class="nav-tab filter-tab on-a" id="navAccess" onclick="toggleLayer('accessible')">
      <div class="nav-icon">&#9855;</div>
      <div class="nav-label">Access</div>
  </button>
  
  <button class="nav-tab action-tab" id="tab-near" onclick="navTap('near')">
      <div class="nav-icon">&#128205;</div>
      <div class="nav-label">Near Me</div>
  </button>
  <button class="nav-tab action-tab" id="tab-run" onclick="navTap('run')">
      <div class="nav-icon" id="run-icon">&#9654;&#65039;</div>
      <div class="nav-label" id="run-label">Run</div>
  </button>
</nav>

<script>
'use strict';

const UNITS = (function() {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
    const useMiles = tz.startsWith('America/') || tz.startsWith('US/') || ['Europe/London','Europe/Belfast'].includes(tz);
    return {
        distLong: useMiles ? 'MILES' : 'KM', pace: useMiles ? 'MIN/MI' : 'MIN/KM',
        fromKm: km => useMiles ? km * 0.621371 : km,
        fmtDist: (km, d=2) => (useMiles ? km*0.621371 : km).toFixed(d) + (useMiles ? ' mi' : ' km'),
        fmtShort: km => (useMiles ? (km*0.621371).toFixed(1)+' mi' : km.toFixed(1)+' km'),
    };
})();

const S = {
  map:null, geocoder:null, dirService:null, dirRenderer:null,
  userMarker:null, userAccuracy:null, userPos:null, 
  mode:'nearest', travelMode:'WALKING', pickingStep:null,
  planStart:null, planEnd:null,
  layers:{toilet:true, water:true, accessible:false},
  markers:[], allLoos:[], activeRoutePath:null,
  ac:{nearest:null, origin:null, dest:null},
  toastTimer:null,
};

const el = id => document.getElementById(id);

function toast(msg, ms=3200) {
  const t=el('toast'); t.innerHTML=msg; t.classList.add('show');
  clearTimeout(S.toastTimer); S.toastTimer=setTimeout(()=>t.classList.remove('show'),ms);
}

function haversine(lat1,lng1,lat2,lng2) {
  const R=6371000, r=Math.PI/180;
  const a=Math.sin(((lat2-lat1)*r)/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(((lng2-lng1)*r)/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
const isWaterOnly = (loo) => loo.t?.f && !loo.t?.w && !loo.t?.b && !loo.golden;

const pinPoo = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="34" height="42" viewBox="0 0 34 42"><defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-opacity="0.30"/></filter></defs><path d="M17 2C9.3 2 3 8.3 3 16c0 9.8 14 24 14 24S31 25.8 31 16C31 8.3 24.7 2 17 2Z" fill="#e8601a" filter="url(#s)"/><circle cx="17" cy="16" r="11" fill="#3d1600"/><text x="17" y="21" font-size="14" text-anchor="middle" font-family="sans-serif">\uD83D\uDCA9</text></svg>');
const pinWater = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="30" height="36" viewBox="0 0 30 36"><defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/></filter></defs><path d="M15 2C8.4 2 3 7.4 3 14c0 8.4 12 20 12 20S27 22.4 27 14C27 7.4 21.6 2 15 2Z" fill="#1a8fd9" filter="url(#s)"/><circle cx="15" cy="14" r="9" fill="#061830"/><text x="15" y="18.5" font-size="11" text-anchor="middle" font-family="sans-serif">\uD83D\uDCA7</text></svg>');
const pinStar = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="34" height="42" viewBox="0 0 34 42"><defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-opacity="0.30"/></filter></defs><path d="M17 2C9.3 2 3 8.3 3 16c0 9.8 14 24 14 24S31 25.8 31 16C31 8.3 24.7 2 17 2Z" fill="#FFD700" filter="url(#s)"/><circle cx="17" cy="16" r="11" fill="#3d1600"/><text x="17" y="21" font-size="14" text-anchor="middle" font-family="sans-serif">\u2B50</text></svg>');

function initMap() {
  try {
    S.map = new google.maps.Map(document.getElementById('map'), {
      center:{lat:-33.87,lng:151.21}, zoom:14, mapTypeId:'roadmap',
      disableDefaultUI:true, gestureHandling:'greedy', clickableIcons:false,
      styles: warmStyle(),
    });
    
    S.geocoder    = new google.maps.Geocoder();
    S.dirService  = new google.maps.DirectionsService();
    S.dirRenderer = new google.maps.DirectionsRenderer({
      suppressMarkers:true,
      polylineOptions:{ strokeColor:'#e8601a', strokeWeight:5, strokeOpacity:0.88 },
    });
    S.dirRenderer.setMap(S.map);

    const acOpts = { fields: ['geometry', 'name'] };
    S.ac.nearest = new google.maps.places.Autocomplete(el('inputNearest'), acOpts);
    S.ac.origin  = new google.maps.places.Autocomplete(el('inputOrigin'), acOpts);
    S.ac.dest    = new google.maps.places.Autocomplete(el('inputDest'), acOpts);

    S.ac.nearest.addListener('place_changed', () => {
        const place = S.ac.nearest.getPlace();
        if (place?.geometry) { S.map.panTo(place.geometry.location); S.map.setZoom(15); renderVisibleMarkers(); }
    });
    S.ac.origin.addListener('place_changed', () => { 
        const place = S.ac.origin.getPlace();
        if (place?.geometry) { S.planStart = place.geometry.location; toast('&#127937; Now search or tap map for FINISH'); }
    });
    S.ac.dest.addListener('place_changed', () => { 
        const place = S.ac.dest.getPlace();
        if (place?.geometry) { S.planEnd = place.geometry.location; planRoute(); }
    });

    S.map.addListener('click', handleMapClick);
    S.map.addListener('idle', renderVisibleMarkers);

    loadData();
    locateMe();
  } catch (error) {
    alert("Map failed to load. Please check your internet connection.");
  }
}

async function loadData() {
  try {
      const res = await fetch('toilets-au.json');
      S.allLoos = await res.json();
      renderVisibleMarkers();
  } catch(e) { console.error("Data load error"); }
}

function setMode(mode) {
  S.mode = mode; S.pickingStep = null;
  el('pillNearest').classList.toggle('active', mode==='nearest');
  el('pillRoute').classList.toggle('active', mode==='route');
  el('cardNearest').classList.toggle('hidden', mode!=='nearest');
  el('cardRoute').classList.toggle('hidden', mode!=='route');
  el('floatingUi').classList.remove('shifted'); 
  
  if (mode==='nearest') clearRoute();
  else toast('&#128205; Search or tap map to set START');
}

function startPicking(step) {
    if (S.mode !== 'route') return;
    S.pickingStep = step;
    toast(step === 'start' ? '&#128205; Tap map to set START' : '&#127937; Tap map to set FINISH');
}

function setTravelMode(mode) {
  S.travelMode = mode;
  ['tmWalk','tmBike','tmDrive'].forEach(id=>el(id).classList.remove('sel'));
  const btnId = {WALKING:'tmWalk',BICYCLING:'tmBike',DRIVING:'tmDrive'}[mode];
  if (btnId && el(btnId)) el(btnId).classList.add('sel');
  if (S.activeRoutePath) planRoute(); 
}

function navTap(tab) {
    if (tab === 'near')   { findNearest(); }
    if (tab === 'run')    { toggleRun(); }
}

function locateMe() {
  const fab = el('fabLocate'); fab.classList.add('spinning');
  if (!navigator.geolocation) { toast('Geolocation not supported'); fab.classList.remove('spinning'); return; }
  
  navigator.geolocation.getCurrentPosition(
    pos => {
      fab.classList.remove('spinning');
      const latLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      S.userPos = latLng;
      
      if (!S.userMarker) {
        S.userAccuracy = new google.maps.Circle({ map: S.map, center: latLng, radius: pos.coords.accuracy, fillColor: '#e8601a', fillOpacity: 0.1, strokeColor: '#e8601a', strokeOpacity: 0.3, strokeWeight: 1, clickable: false, zIndex: 1 });
        S.userMarker = new google.maps.Marker({ position: latLng, map: S.map, icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: '#e8601a', fillOpacity: 1, strokeColor: '#FFFFFF', strokeWeight: 3, scale: 8 }, zIndex: 10, clickable: false });
      } else {
        S.userMarker.setPosition(latLng); S.userAccuracy.setCenter(latLng); S.userAccuracy.setRadius(pos.coords.accuracy);
      }
      S.map.panTo(latLng); S.map.setZoom(15);
      renderVisibleMarkers();
    },
    () => { fab.classList.remove('spinning'); toast('Could not get GPS location'); },
    {enableHighAccuracy:true, timeout:10000}
  );
}

function searchNearest() {}

function handleMapClick(e) {
    if (S.mode === 'route' && S.pickingStep) {
        const latLng = e.latLng;
        S.geocoder.geocode({ location: latLng }, (results, status) => {
            const label = (status === 'OK' && results[0]) ? results[0].formatted_address.split(',')[0] : 'Map Location';
            if (S.pickingStep === 'start') {
                S.planStart = latLng;
                el('inputOrigin').value = label;
                S.pickingStep = 'end';
                toast('&#127937; Tap map to set FINISH');
            } else if (S.pickingStep === 'end') {
                S.planEnd = latLng;
                el('inputDest').value = label;
                S.pickingStep = null;
                planRoute();
            }
        });
    } else {
        closeSheet(); 
    }
}

function planRoute() {
    if (!S.planStart || !S.planEnd) { toast('Set both locations first'); return; }
    toast('Mapping route...');
    closeSheet();
    
    S.dirService.route({
        origin: S.planStart,
        destination: S.planEnd,
        travelMode: google.maps.TravelMode[S.travelMode]
    }, (result, status) => {
        if (status !== 'OK') { toast('Could not find a route here.'); return; }
        
        S.dirRenderer.setDirections(result);
        const leg = result.routes[0].legs[0];
        S.activeRoutePath = result.routes[0].overview_path;
        
        el('statDist').innerHTML = leg.distance.text;
        el('statTime').innerHTML = leg.duration.text;
        
        el('routeBar').classList.add('show');
        el('floatingUi').classList.add('shifted');
        
        renderVisibleMarkers();
    });
}

function clearRoute() {
    S.dirRenderer.setDirections({routes:[]});
    S.activeRoutePath = null;
    S.planStart = null; S.planEnd = null;
    el('inputOrigin').value = ''; el('inputDest').value = '';
    
    el('routeBar').classList.remove('show');
    el('floatingUi').classList.remove('shifted');
    
    renderVisibleMarkers();
}

function toggleLayer(layer) {
  S.layers[layer] = !S.layers[layer];
  if (layer === 'toilet') el('navToilet').classList.toggle('active', S.layers.toilet);
  if (layer === 'water') el('navWater').classList.toggle('active', S.layers.water);
  if (layer === 'accessible') el('navAccess').classList.toggle('active', S.layers.accessible);
  renderVisibleMarkers();
}

function renderVisibleMarkers() {
    const bounds = S.map.getBounds();
    if (!bounds && !S.activeRoutePath) return;

    S.markers.forEach(m => m.setMap(null));
    S.markers = [];
    
    let routePolyline = null;
    if (S.activeRoutePath) routePolyline = new google.maps.Polyline({ path: S.activeRoutePath });

    let tCount = 0, wCount = 0;

    S.allLoos.forEach(loo => {
        const latLng = new google.maps.LatLng(loo.lat, loo.lon);
        let show = false;
        
        if (S.activeRoutePath) {
            show = google.maps.geometry.poly.isLocationOnEdge(latLng, routePolyline, 0.0018);
        } else {
            show = bounds && bounds.contains(latLng);
        }
        if (!show) return;

        const isWater = isWaterOnly(loo);
        const isAccess = loo.t && loo.t.w;

        if (isWater && !S.layers.water) return;
        if (!isWater && !S.layers.toilet) return;
        if (S.layers.accessible && !isAccess && !isWater) return;

        if (S.markers.length > 90) return;

        isWater ? wCount++ : tCount++;

        let iconUrl = pinPoo;
        if (isWater) iconUrl = pinWater;
        if (loo.golden) iconUrl = pinStar;

        const marker = new google.maps.Marker({
            position: latLng,
            map: S.map,
            icon: {
                url: iconUrl,
                scaledSize: new google.maps.Size(isWater? 30 : 34, isWater? 36 : 42),
                anchor: new google.maps.Point(isWater? 15 : 17, isWater? 36 : 42)
            },
            optimized: false
        });

        marker.addListener('click', () => openSheet(loo));
        S.markers.push(marker);
    });

    if (S.activeRoutePath) {
        el('statToilets').innerHTML = tCount;
        el('statWater').innerHTML = wCount;
    } else {
        el('countT').innerHTML = tCount;
        el('countW').innerHTML = wCount;
        if (tCount > 0 || wCount > 0) {
            el('countPill').classList.add('show');
            setTimeout(() => el('countPill').classList.remove('show'), 3000);
        }
    }
}

function findNearest() {
    closeAll();
    if (!S.userPos) { toast('Waiting for GPS fix...'); return; }
    const { lat, lng } = S.userPos;
    let nearest = null, bestDist = Infinity;
    S.allLoos.forEach(l => {
        const isWater = isWaterOnly(l);
        if (isWater && !S.layers.water) return;
        if (!isWater && !S.layers.toilet) return;
        if (S.layers.accessible && (!l.t || !l.t.w) && !isWater) return;

        const d = haversine(lat, lng, l.lat, l.lon);
        if (d < bestDist) { bestDist = d; nearest = l; }
    });
    if (nearest) {
        S.map.panTo({ lat: nearest.lat, lng: nearest.lon });
        S.map.setZoom(17);
        openSheet(nearest);
    } else {
        toast("No facilities match your active filters nearby.");
    }
}

function openSheet(loo) {
    S.currentLoo = loo;
    const isW = isWaterOnly(loo);
    
    let chipsHtml = '';
    if (!isW) {
        if (loo.t?.w) chipsHtml += '<div class="chip yes">&#9855; Accessible</div>';
        if (loo.t?.b) chipsHtml += '<div class="chip yes">&#127868; Baby change</div>';
        if (loo.t?.u) chipsHtml += '<div class="chip">&#128699; Unisex</div>';
        if (loo.t?.f && !loo.t?.u) chipsHtml += '<div class="chip">&#128698; Female</div>';
        if (loo.t?.m && !loo.t?.u) chipsHtml += '<div class="chip">&#128697; Male</div>';
        if (loo.t?.o === '24/7') chipsHtml += '<div class="chip yes">&#128994; 24/7</div>';
        else if (loo.t?.o) chipsHtml += `<div class="chip">&#128336; ${loo.t.o}</div>`;
    } else {
        chipsHtml += '<div class="chip water-yes">&#128167; Drinking water</div>';
    }

    const typeBadge = isW ? '<div class="type-badge water">&#128167; Drinking Water</div>' : (loo.golden ? '<div class="type-badge toilet">&#11088; Featured Sanctuary</div>' : '<div class="type-badge toilet">&#128699; Public Toilet</div>');

    let distHtml = '';
    if (S.userPos) {
        const dist = haversine(S.userPos.lat, S.userPos.lng, loo.lat, loo.lon);
        distHtml = `&nbsp;&middot;&nbsp; ${dist < 1000 ? Math.round(dist) + 'm' : (dist/1000).toFixed(1) + 'km'} away`;
    }

    const gUrl = `https://www.google.com/maps/dir/?api=1&destination=${loo.lat},${loo.lon}&travelmode=walking`;

    el('sheetBody').innerHTML = `
      ${typeBadge}
      <div class="sheet-name">${loo.n}</div>
      <div class="sheet-meta">${loo.a || 'Mapped Location'}${distHtml}</div>
      <div class="chip-row">${chipsHtml}</div>
      ${loo.note ? `<div class="sheet-notes">${loo.note}</div>` : ''}
      <a href="${gUrl}" target="_blank" style="text-decoration:none;"><div class="dir-btn">&#128205; GET DIRECTIONS</div></a>
    `;
    
    el('backdrop').classList.add('on');
    el('sheet').classList.add('on');
}

function closeSheet() {
    el('backdrop').classList.remove('on');
    el('sheet').classList.remove('on');
    S.currentLoo = null;
}

function closeAll() {
    closeSheet();
}

function toggleRun() { isRunning ? stopRun() : startRun(); }
function startRun() {
    if (!navigator.geolocation) { toast('Geolocation not available.'); return; }
    isRunning=true; runPath=[]; totalDistKm=0; lastPos=null; runStartTime=Date.now();
    
    el('run-hud').classList.add('active');
    const tab = el('tab-run');
    tab.classList.add('running'); 
    el('run-icon').innerHTML = '&#9209;&#65039;'; 
    el('run-label').innerText = 'Stop';
    
    if (runPolyline) runPolyline.setMap(null);
    runPolyline = new google.maps.Polyline({ path: runPath, geodesic:true, strokeColor:'#e8601a', strokeOpacity:0.9, strokeWeight:5, map: S.map });
    
    runWatchId = navigator.geolocation.watchPosition(
        pos => { 
            const {latitude:lat, longitude:lon, accuracy} = pos.coords; 
            if (accuracy>40) return; 
            if (lastPos) { const seg=haversine(lastPos.lat,lastPos.lon,lat,lon) / 1000; if(seg>0.003&&seg<0.3) totalDistKm+=seg; } 
            lastPos={lat,lon}; runPath.push({lat,lng:lon}); runPolyline.setPath(runPath); S.map.panTo({lat,lng:lon}); updateHUD(lat,lon); 
        },
        err => console.warn('Run GPS:',err.message), {enableHighAccuracy:true, maximumAge:2000, timeout:10000}
    );
}

function stopRun() {
    isRunning=false;
    if (runWatchId!==null) { navigator.geolocation.clearWatch(runWatchId); runWatchId=null; }
    el('run-hud').classList.remove('active');
    const tab = el('tab-run');
    tab.classList.remove('running'); 
    el('run-icon').innerHTML = '&#9654;&#65039;'; 
    el('run-label').innerText = 'Run';
}

function nearbyPitStops(lat,lon) { return S.allLoos.filter(l=>haversine(lat,lon,l.lat,l.lon)<=500).length; }
function formatPace(m) { if (!isFinite(m)||m<=0||m>99) return '--:--'; const min=Math.floor(m), s=String(Math.round((m-min)*60)).padStart(2,'0'); return `${min}:${s}`; }
function updateHUD(lat,lon) { el('hud-dist').innerText = UNITS.fromKm(totalDistKm).toFixed(2); const elapsed=(Date.now()-runStartTime)/60000; const d=UNITS.fromKm(totalDistKm); el('hud-pace').innerText = formatPace(d>0.05 ? elapsed/d : 0); el('hud-pits').innerText = nearbyPitStops(lat,lon); }

function warmStyle() {
  return [
    {elementType:'geometry',                  stylers:[{color:'#f5f0e8'}]},
    {elementType:'labels.text.fill',          stylers:[{color:'#6b6258'}]},
    {elementType:'labels.text.stroke',        stylers:[{color:'#faf8f3'}]},
    {featureType:'road',elementType:'geometry',       stylers:[{color:'#ffffff'}]},
    {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#e0dbd2'}]},
    {featureType:'road',elementType:'labels.text.fill',stylers:[{color:'#8a8070'}]},
    {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#ffe0b0'}]},
    {featureType:'road.highway',elementType:'geometry.stroke',stylers:[{color:'#e8c880'}]},
    {featureType:'water',elementType:'geometry',      stylers:[{color:'#c5dff0'}]},
    {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#5a8aaa'}]},
    {featureType:'poi',elementType:'geometry',        stylers:[{color:'#ede8e0'}]},
    {featureType:'poi',elementType:'labels',          stylers:[{visibility:'off'}]},
    {featureType:'poi.park',elementType:'geometry',   stylers:[{color:'#d4e8c8'}]},
    {featureType:'poi.park',elementType:'labels',     stylers:[{visibility:'off'}]},
    {featureType:'transit',elementType:'geometry',    stylers:[{visibility:'off'}]},
    {featureType:'transit',elementType:'labels',      stylers:[{visibility:'off'}]},
    {featureType:'administrative.land_parcel',elementType:'labels',stylers:[{visibility:'off'}]},
    {featureType:'administrative.neighborhood',elementType:'labels',stylers:[{visibility:'off'}]}
  ];
}
</script>
